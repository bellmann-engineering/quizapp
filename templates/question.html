<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Frage {{ index + 1 }} von {{ total }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }

        .progress-bar-container {
            background: #e2e8f0;
            border-radius: 99px;
            height: 8px;
            margin-bottom: 28px;
        }

        .progress-bar {
            background: #4f46e5;
            height: 8px;
            border-radius: 99px;
            width: {{ ((index + 1) / total * 100) | int }}%;
            transition: width 0.3s ease;
        }

        .progress-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: 500;
        }

        h2 {
            font-size: 20px;
            color: #1e293b;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            font-size: 15px;
            color: #334155;
        }

        .option-label:hover {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        input[type="radio"] {
            accent-color: #4f46e5;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        input[type="radio"]:checked + span {
            font-weight: 600;
            color: #4f46e5;
        }

        .option-label:has(input:checked) {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

<div class="card">
    <p class="progress-label">Frage {{ index + 1 }} von {{ total }}</p>
    <div class="progress-bar-container">
        <div class="progress-bar"></div>
    </div>

    <h2>{{ question.question }}</h2>

    <form method="post" action="/answer">
        <div class="options">
            {% for option in question.options %}
            <label class="option-label">
                <input type="radio" name="option" value="{{ loop.index0 }}" required>
                <span>{{ option }}</span>
            </label>
            {% endfor %}
        </div>

        <button type="submit">Weiter &rarr;</button>
    </form>
</div>

</body>
</html>
